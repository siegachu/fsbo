            {"@type": "Question", "name": "How much can I save selling FSBO?", "acceptedAnswer": {"@type": "Answer", "text": "On a $400,000 home, you can save $20,000-$24,000 compared to a full-service agent. The typical full-service commission is 5-6%. Since the 2024 NAR settlement, you are no longer required to offer buyer agent compensation — buyers pay their own agent."}},
            {"@type": "Question", "name": "Do FSBO homes sell for less than agent-listed homes?", "acceptedAnswer": {"@type": "Answer", "text": "Statistically, FSBO homes sell for about $55,000-$65,000 less on average. However, this includes many FSBO sales between family/friends at below-market prices. When comparing arms-length transactions with proper marketing, the gap narrows significantly."}},
            {"@type": "Question", "name": "Do I still need to pay the buyer's agent commission?", "acceptedAnswer": {"@type": "Answer", "text": "No. After the 2024 NAR settlement (effective August 17, 2024), sellers are no longer required to offer buyer agent compensation on the MLS. Buyers now negotiate and pay their own agent fees through written buyer-broker agreements."}},
            {"@type": "Question", "name": "What did the 2024 NAR settlement change?", "acceptedAnswer": {"@type": "Answer", "text": "Effective August 17, 2024: (1) Sellers no longer must offer buyer agent compensation on the MLS, (2) buyer agents must sign written agreements with buyers before touring homes, (3) all commission structures must be transparently disclosed."}},
            {"@type": "Question", "name": "Do I have to pay capital gains tax when I sell my home?", "acceptedAnswer": {"@type": "Answer", "text": "If it's your primary residence and you've owned AND lived in it for at least 2 of the last 5 years, you can exclude up to $250,000 in profit (single) or $500,000 (married filing jointly) from capital gains tax."}},
            {"@type": "Question", "name": "What is the SALT deduction cap and how does it affect me?", "acceptedAnswer": {"@type": "Answer", "text": "The SALT deduction was capped at $10,000 by the TCJA. For 2025-2029, the One Big Beautiful Bill Act raised the cap to $40,000 ($20,000 for married filing separately), increasing by 1% annually. The higher cap phases out for MAGI above $500,000."}},
            {"@type": "Question", "name": "What is a 1031 exchange and does it apply to my home sale?", "acceptedAnswer": {"@type": "Answer", "text": "1031 exchanges let you defer capital gains tax by reinvesting sale proceeds into another investment property within 180 days. They only apply to investment/business property — NOT your primary residence."}},
            {"@type": "Question", "name": "Do I need a real estate attorney to sell FSBO?", "acceptedAnswer": {"@type": "Answer", "text": "It depends on your state. Attorney states (where a lawyer is required at closing): CT, DE, GA, IL, LA, NJ, NY, NC, SC, and others. Even in non-attorney states, hiring one ($500-$1,500) is strongly recommended."}},
            {"@type": "Question", "name": "What disclosures am I required to make?", "acceptedAnswer": {"@type": "Answer", "text": "Federal: lead paint disclosure for pre-1978 homes (all states). State: most states require a property condition disclosure form covering structural defects, water damage, environmental hazards, plumbing/electrical/HVAC condition, pest issues, zoning violations. Failing to disclose known defects is the #1 cause of FSBO lawsuits."}},
            {"@type": "Question", "name": "What are total FSBO closing costs?", "acceptedAnswer": {"@type": "Answer", "text": "On a $400K home, total FSBO closing costs are typically $3,000-$8,000 (0.75-2%). This includes transfer tax, title insurance, attorney, flat-fee MLS, recording fees, and prorated property taxes."}},
